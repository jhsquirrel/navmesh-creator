<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-
fit=no,user-scalable=no,maximum-scale=1">
    <title>Delaunay triangulation</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/afram
e-environment-component.min.js"></script>

    <script>

    </script>
  </head>
<body>
    <a-scene environment="preset: default; lighting: point; lightPosition: -5 10 0; stageSize: 10">
      <a-assets>
        <a-asset-item id="navmesh" src="delaunay.obj"></a-asset-item>
        <a-asset-item id="object" src="delaunay.obj"></a-asset-item>
	<a-asset-item id="mtl" src="white.mtl"></a-asset-item>
      </a-assets>

      <!-- Player. -->
      <a-entity id="rig"
                movement-controls="constrainToNavMesh: true;
                                   controls: checkpoint, gamepad, trackpad, keyboard, nipple;"
                position="45 10 45">
        <a-entity camera
                  position="0 1.6 0"
                  look-controls="pointerLockEnabled: true">
          <a-cursor></a-cursor>
        </a-entity>
      </a-entity>

      <!-- Nav mesh. -->
      <a-entity nav-mesh
                normal-material
                visible="true"
                position="0 0 0"
                obj-model="obj: #navmesh">
      </a-entity>

      <!-- Scene. -->
      <a-entity position="0 0 0"
                scale="1 1 1"
		obj-model="obj: #object; mtl: #mtl">
      </a-entity>
      <a-box position="-5.0 0.0 15.0" scale="10.0 10.0 10.0" color="#FF00DD"></a-box>
    </a-scene>
  </body>
</html>
